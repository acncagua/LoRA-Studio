{% extends "base.html" %}{% block content %}
<header class="page-head"><h1>Presets</h1></header>
<table><thead><tr><th>Name</th><th>Family</th><th>Script</th><th>Purpose</th></tr></thead><tbody>{% for preset in presets %}<tr><td><a href="/presets/{{ preset.id }}">{{ preset.name }}</a></td><td>{{ preset.model_family }}</td><td>{{ preset.training_script }}</td><td>{{ preset.purpose }}</td></tr>{% endfor %}</tbody></table>
{% endblock %}
